server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  ai:
    openai:
      api-key: "AIzaSyBURiJ7WG0HiIsEJKRB031pN9Xc-JsuH6w"
      chat:
        base-url: https://generativelanguage.googleapis.com
        completions-path: /v1beta/openai/chat/completions
        options:
          model: gemini-2.5-flash

  mail:
    host: smtp.gmail.com
    port: 587
    username: shopapp.notify@gmail.com   # TODO: Thay bằng email thật của bạn
    password: your-app-password-here      # TODO: Thay bằng App Password 16 ký tự từ Google
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: "jdbc:mysql://localhost:3306/shop_app"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: en
